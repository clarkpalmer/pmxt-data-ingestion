<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PMXT Data Ingestion</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --red: #f85149; --yellow: #d29922;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace; background: var(--bg); color: var(--text); }
  .container { max-width: 1100px; margin: 0 auto; padding: 24px; }
  h1 { font-size: 1.5rem; margin-bottom: 4px; }
  h2 { font-size: 1.1rem; color: var(--accent); margin: 20px 0 10px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
  .subtitle { color: var(--muted); font-size: 0.85rem; margin-bottom: 20px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
  .card-full { grid-column: 1 / -1; }
  .stat { display: inline-block; margin-right: 24px; margin-bottom: 8px; }
  .stat-value { font-size: 1.4rem; font-weight: 600; color: var(--accent); }
  .stat-label { font-size: 0.75rem; color: var(--muted); }
  label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 4px; }
  input, select, textarea { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 8px 10px; border-radius: 6px; width: 100%; font-size: 0.85rem; font-family: inherit; }
  input:focus, textarea:focus { border-color: var(--accent); outline: none; }
  textarea { resize: vertical; min-height: 60px; }
  button { background: var(--accent); color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 600; }
  button:hover { opacity: 0.9; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.secondary { background: var(--surface); border: 1px solid var(--border); color: var(--text); }
  button.danger { background: var(--red); }
  .row { display: flex; gap: 10px; align-items: end; }
  .row > * { flex: 1; }
  .chip { display: inline-block; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 3px 10px; font-size: 0.75rem; margin: 2px; }
  .chip .remove { cursor: pointer; color: var(--red); margin-left: 4px; }
  .progress-bar { background: var(--bg); border-radius: 4px; height: 20px; overflow: hidden; margin: 8px 0; }
  .progress-fill { background: var(--accent); height: 100%; transition: width 0.3s; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 600; }
  .log { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px; max-height: 300px; overflow-y: auto; font-size: 0.75rem; font-family: monospace; line-height: 1.6; color: var(--muted); }
  .log .line { white-space: pre-wrap; }
  table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
  th, td { text-align: left; padding: 6px 10px; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 500; }
  .bar-cell { width: 120px; }
  .bar { height: 14px; background: var(--accent); border-radius: 3px; opacity: 0.7; }
  .search-results { max-height: 250px; overflow-y: auto; }
  .search-result { padding: 8px; border-bottom: 1px solid var(--border); cursor: pointer; font-size: 0.8rem; }
  .search-result:hover { background: var(--bg); }
  .search-result .slug { color: var(--accent); }
  .search-result .question { color: var(--muted); font-size: 0.75rem; }
  .tag { color: var(--green); }
  .hidden { display: none; }
  .tabs { display: flex; gap: 2px; margin-bottom: 12px; }
  .tab { padding: 6px 14px; border-radius: 6px 6px 0 0; cursor: pointer; font-size: 0.8rem; color: var(--muted); border: 1px solid transparent; }
  .tab.active { background: var(--surface); color: var(--text); border-color: var(--border); border-bottom-color: var(--surface); }
  .flash { padding: 8px 12px; border-radius: 6px; font-size: 0.8rem; margin-bottom: 10px; }
  .flash-ok { background: #0d2818; border: 1px solid var(--green); color: var(--green); }
  .flash-err { background: #2d1014; border: 1px solid var(--red); color: var(--red); }
</style>
</head>
<body>
<div class="container">
  <h1>PMXT Data Ingestion</h1>
  <p class="subtitle">Download, filter, and explore Polymarket orderbook data</p>

  <div id="flash"></div>

  <!-- Status Overview -->
  <div id="status-bar" class="card" style="margin-bottom:16px">
    <div class="stat"><div class="stat-value" id="s-cids">-</div><div class="stat-label">Condition IDs</div></div>
    <div class="stat"><div class="stat-value" id="s-hours">-</div><div class="stat-label">Hours Downloaded</div></div>
    <div class="stat"><div class="stat-value" id="s-rows">-</div><div class="stat-label">Orderbook Rows</div></div>
    <div class="stat"><div class="stat-value" id="s-size">-</div><div class="stat-label">Total Size</div></div>
    <div class="stat"><div class="stat-value" id="s-trades">-</div><div class="stat-label">Trades</div></div>
  </div>

  <div class="grid">
    <!-- Config Panel -->
    <div class="card">
      <h2>Configuration</h2>
      <div class="row" style="margin-bottom:10px">
        <div><label>Start Date</label><input type="text" id="cfg-start" placeholder="2026-04-27 or 2026-04-27T06"></div>
        <div><label>End Date</label><input type="text" id="cfg-end" placeholder="2026-04-27 or 2026-04-27T10"></div>
      </div>

      <label>Updown Markets (asset:duration, one per line)</label>
      <textarea id="cfg-markets" rows="3" placeholder="btc:5m&#10;eth:5m&#10;sol:15m"></textarea>

      <label style="margin-top:10px">Slugs (one per line)</label>
      <textarea id="cfg-slugs" rows="2" placeholder="will-bitcoin-reach-122k-september-15-21"></textarea>

      <label style="margin-top:10px">Condition IDs (one per line)</label>
      <textarea id="cfg-cids" rows="2" placeholder="0x94b3610eec..."></textarea>

      <label style="margin-top:10px">Event IDs (one per line)</label>
      <textarea id="cfg-events" rows="2" placeholder="196660"></textarea>

      <label style="margin-top:10px">Tags (one per line)</label>
      <textarea id="cfg-tags" rows="2" placeholder="crypto&#10;esports"></textarea>

      <div style="margin-top:12px; display:flex; gap:8px">
        <button onclick="saveConfig()">Save Config</button>
        <button class="secondary" onclick="loadConfig()">Reset</button>
      </div>
    </div>

    <!-- Search Panel -->
    <div class="card">
      <h2>Search Markets</h2>
      <div class="row">
        <div><input type="text" id="search-input" placeholder="Search by slug, title, or keyword..." oninput="debounceSearch()"></div>
      </div>
      <div id="search-results" class="search-results" style="margin-top:10px"></div>
      <div id="search-empty" class="hidden" style="color:var(--muted);font-size:0.8rem;padding:8px">No results</div>
    </div>

    <!-- Download Panel -->
    <div class="card card-full">
      <h2>Download</h2>
      <div style="display:flex;gap:10px;align-items:center;margin-bottom:10px">
        <button id="dl-btn" onclick="startDownload()">Start Download</button>
        <span id="dl-phase" style="color:var(--muted);font-size:0.85rem"></span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="dl-progress" style="width:0%"></div></div>
      <div class="log" id="dl-log"></div>
    </div>

    <!-- Report Panel -->
    <div class="card card-full">
      <h2>Coverage Report</h2>
      <button class="secondary" onclick="loadReport()" style="margin-bottom:10px">Refresh Report</button>
      <div id="report-summary"></div>
      <div id="report-types" style="margin-top:10px"></div>
      <div id="report-hours" style="margin-top:10px"></div>
    </div>

    <!-- Files Panel -->
    <div class="card card-full">
      <h2>Data Files</h2>
      <table id="files-table">
        <thead><tr><th>File</th><th>Rows</th><th>Size</th><th>Visual</th></tr></thead>
        <tbody id="files-body"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const API = '';
let searchTimeout = null;

// --- Config ---
async function loadConfig() {
  const r = await fetch(API + '/api/config');
  const cfg = await r.json();
  document.getElementById('cfg-start').value = cfg.start_date || '';
  document.getElementById('cfg-end').value = cfg.end_date || '';
  document.getElementById('cfg-markets').value = (cfg.markets || []).map(m => m.asset + ':' + m.duration).join('\n');
  document.getElementById('cfg-slugs').value = (cfg.slugs || []).join('\n');
  document.getElementById('cfg-cids').value = (cfg.condition_ids || []).join('\n');
  document.getElementById('cfg-events').value = (cfg.event_ids || []).map(String).join('\n');
  document.getElementById('cfg-tags').value = (cfg.tags || []).join('\n');
}

async function saveConfig() {
  const markets = document.getElementById('cfg-markets').value.trim().split('\n').filter(Boolean).map(l => {
    const [a, d] = l.split(':');
    return {asset: a.trim(), duration: (d || '5m').trim()};
  });
  const lines = s => document.getElementById(s).value.trim().split('\n').filter(Boolean);
  const cfg = {
    data_dir: 'data',
    download: {connections: 4, temp_dir: '/tmp/pmxt_ingestion'},
    start_date: document.getElementById('cfg-start').value.trim(),
    end_date: document.getElementById('cfg-end').value.trim(),
  };
  if (markets.length) cfg.markets = markets;
  const slugs = lines('cfg-slugs'); if (slugs.length) cfg.slugs = slugs;
  const cids = lines('cfg-cids'); if (cids.length) cfg.condition_ids = cids;
  const events = lines('cfg-events'); if (events.length) cfg.event_ids = events;
  const tags = lines('cfg-tags'); if (tags.length) cfg.tags = tags;

  const r = await fetch(API + '/api/config', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(cfg)});
  const j = await r.json();
  flash(j.ok ? 'Config saved' : 'Error: ' + j.error, j.ok);
  loadStatus();
}

// --- Status ---
async function loadStatus() {
  try {
    const r = await fetch(API + '/api/status');
    const s = await r.json();
    document.getElementById('s-cids').textContent = s.condition_ids_count.toLocaleString();
    document.getElementById('s-hours').textContent = s.hours_downloaded + '/' + s.hours_total;
    document.getElementById('s-rows').textContent = s.orderbook.total_rows.toLocaleString();
    document.getElementById('s-size').textContent = s.orderbook.total_size_mb + ' MB';
    document.getElementById('s-trades').textContent = s.trades ? s.trades.rows.toLocaleString() : '-';

    const tbody = document.getElementById('files-body');
    const maxRows = Math.max(...s.orderbook.files.map(f => f.rows || 0), 1);
    tbody.innerHTML = s.orderbook.files.map(f =>
      f.corrupt
        ? `<tr><td>${f.name}</td><td style="color:#f66">CORRUPT</td><td>${f.size_mb} MB</td><td class="bar-cell"></td></tr>`
        : `<tr><td>${f.name}</td><td>${f.rows.toLocaleString()}</td><td>${f.size_mb} MB</td><td class="bar-cell"><div class="bar" style="width:${f.rows/maxRows*100}%"></div></td></tr>`
    ).join('');
  } catch(e) {}
}

// --- Search ---
function debounceSearch() {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(doSearch, 400);
}

async function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  const div = document.getElementById('search-results');
  const empty = document.getElementById('search-empty');
  if (q.length < 2) { div.innerHTML = ''; empty.classList.add('hidden'); return; }

  const r = await fetch(API + '/api/search?q=' + encodeURIComponent(q));
  const results = await r.json();

  if (!results.length) {
    div.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');
  div.innerHTML = results.map(m => {
    const tags = (m.tags || []).slice(0, 4).map(t => `<span class="chip">${t}</span>`).join('');
    return `<div class="search-result" onclick="addFromSearch('${esc(m.slug)}','${esc(m.condition_id)}')">
      <div class="slug">${esc(m.slug)}</div>
      <div class="question">${esc(m.question)}</div>
      <div>${tags}</div>
    </div>`;
  }).join('');
}

function addFromSearch(slug, cid) {
  const el = document.getElementById('cfg-slugs');
  const current = el.value.trim();
  if (!current.includes(slug)) {
    el.value = current ? current + '\n' + slug : slug;
    flash('Added: ' + slug, true);
  }
}

// --- Download ---
let pollInterval = null;

async function startDownload() {
  const btn = document.getElementById('dl-btn');
  btn.disabled = true;
  const r = await fetch(API + '/api/download', {method: 'POST'});
  const j = await r.json();
  if (j.error) { flash(j.error, false); btn.disabled = false; return; }
  pollInterval = setInterval(pollDownload, 1000);
}

async function pollDownload() {
  const r = await fetch(API + '/api/download/status');
  const s = await r.json();

  document.getElementById('dl-phase').textContent = s.phase || '';
  const pct = s.total > 0 ? Math.round(s.progress / s.total * 100) : 0;
  const bar = document.getElementById('dl-progress');
  bar.style.width = (s.phase === 'done' ? 100 : pct) + '%';
  bar.textContent = s.phase === 'done' ? 'Complete' : (s.total > 0 ? `${s.progress}/${s.total}` : '');

  const log = document.getElementById('dl-log');
  log.innerHTML = s.log.map(l => `<div class="line">${l}</div>`).join('');
  log.scrollTop = log.scrollHeight;

  if (!s.running) {
    clearInterval(pollInterval);
    document.getElementById('dl-btn').disabled = false;
    if (s.error) flash('Download error: ' + s.error, false);
    else if (s.done) flash('Download complete!', true);
    loadStatus();
    loadReport();
  }
}

// --- Report ---
async function loadReport() {
  try {
    const r = await fetch(API + '/api/report');
    const rpt = await r.json();
    if (rpt.error) { document.getElementById('report-summary').innerHTML = `<span style="color:var(--muted)">${rpt.error}</span>`; return; }

    const total = rpt.total_markets || 1;
    document.getElementById('report-summary').innerHTML = `
      <div class="stat"><div class="stat-value">${rpt.total_markets}</div><div class="stat-label">Total Markets</div></div>
      <div class="stat"><div class="stat-value tag">${rpt.with_orderbook}</div><div class="stat-label">With Orderbook (${Math.round(rpt.with_orderbook/total*100)}%)</div></div>
      <div class="stat"><div class="stat-value">${rpt.with_trades}</div><div class="stat-label">With Trades</div></div>
      <div class="stat"><div class="stat-value">${rpt.with_resolutions}</div><div class="stat-label">With Resolutions</div></div>
      <div class="stat"><div class="stat-value">${rpt.with_all}</div><div class="stat-label">Complete (All 3)</div></div>
    `;

    // Type breakdown table
    const types = rpt.by_type || {};
    let typeHtml = '<table><thead><tr><th>Type</th><th>Total</th><th>Orderbook</th><th>Trades</th><th>Resolved</th><th>All 3</th></tr></thead><tbody>';
    for (const [k, v] of Object.entries(types)) {
      typeHtml += `<tr><td>${k}</td><td>${v.total}</td><td>${v.ob} (${Math.round(v.ob/v.total*100)}%)</td><td>${v.trades}</td><td>${v.res}</td><td>${v.all}</td></tr>`;
    }
    typeHtml += '</tbody></table>';
    document.getElementById('report-types').innerHTML = typeHtml;

    // Hourly coverage
    const hours = rpt.by_hour || {};
    let hourHtml = '<table><thead><tr><th>Hour (UTC)</th><th>Coverage</th><th></th></tr></thead><tbody>';
    for (const [h, v] of Object.entries(hours)) {
      const pct = v.total > 0 ? Math.round(v.with_ob / v.total * 100) : 0;
      hourHtml += `<tr><td>${h.padStart(2,'0')}:00</td><td>${v.with_ob}/${v.total} (${pct}%)</td><td class="bar-cell"><div class="bar" style="width:${pct}%;background:var(--green)"></div></td></tr>`;
    }
    hourHtml += '</tbody></table>';
    document.getElementById('report-hours').innerHTML = hourHtml;
  } catch(e) {}
}

// --- Utilities ---
function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

function flash(msg, ok) {
  const el = document.getElementById('flash');
  el.innerHTML = `<div class="flash ${ok ? 'flash-ok' : 'flash-err'}">${msg}</div>`;
  setTimeout(() => el.innerHTML = '', 4000);
}

// Init
loadConfig();
loadStatus();
loadReport();
</script>
</body>
</html>
